name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.79.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  # Core workspace (the mesh crates + meshd/meshrun daemons). meshd's IPC is a unix
  # domain socket, so it is unix-only for now — its Windows port (named pipe + Wintun
  # data plane) is tracked separately, so the Windows job builds the rest.
  test:
    name: build + test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.79.0
      - uses: Swatinem/rust-cache@v2
      - name: build + test (full workspace, all platforms)
        run: |
          cargo build --workspace --all-targets
          cargo test --workspace

  # The Tauri desktop app (auto-launches the bundled meshd via a native auth dialog),
  # built + bundled on all three platforms with stable (the webview deps need a newer
  # edition than the workspace MSRV).
  desktop:
    name: desktop app (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 ships WebKitGTK 4.0, which Tauri v1 builds against (24.04
        # only has 4.1).
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux WebKitGTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Front-end deps
        working-directory: gui
        run: npm ci || npm install

      # Build the bundled meshd and stage it under the platform binary name (the
      # resources dir holds only build artifacts — gitignored — so create it).
      - name: Build + stage meshd (+ wintun.dll on Windows)
        shell: bash
        run: |
          cargo build --release -p lattice-meshd
          mkdir -p gui/src-tauri/resources
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/meshd.exe gui/src-tauri/resources/meshd.exe
          else
            cp target/release/meshd gui/src-tauri/resources/meshd
          fi
          # wintun.dll (the Windows TUN driver meshd loads at runtime) is committed at
          # gui/src-tauri/resources/wintun.dll and bundled next to meshd.exe.
      - name: Bundle desktop app
        working-directory: gui
        run: npm run tauri build
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.os }}
          path: |
            gui/src-tauri/target/release/bundle/**/*.dmg
            gui/src-tauri/target/release/bundle/**/*.AppImage
            gui/src-tauri/target/release/bundle/**/*.deb
            gui/src-tauri/target/release/bundle/**/*.msi
            gui/src-tauri/target/release/bundle/**/*-setup.exe
          if-no-files-found: ignore

  deny:
    name: licenses + advisories
    runs-on: ubuntu-latest
    # Non-blocking: cargo-deny pulls the live RustSec advisory DB, which currently
    # has a malformed entry (a parse error unrelated to this project). Keep it
    # informational so an upstream DB bug doesn't red the whole run.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
