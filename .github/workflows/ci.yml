name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.79.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  # Core workspace (the mesh crates + meshd/meshrun daemons). meshd's IPC is a unix
  # domain socket, so it is unix-only for now — its Windows port (named pipe + Wintun
  # data plane) is tracked separately, so the Windows job builds the rest.
  test:
    name: build + test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.79.0
      - uses: Swatinem/rust-cache@v2
      - name: build + test (unix — full workspace)
        if: runner.os != 'Windows'
        run: |
          cargo build --workspace --all-targets
          cargo test --workspace
      - name: build + test (windows — meshd excluded)
        if: runner.os == 'Windows'
        run: |
          cargo build --workspace --all-targets --exclude lattice-meshd
          cargo test --workspace --exclude lattice-meshd

  # The Tauri desktop app (auto-launches the bundled meshd via a native auth dialog).
  # Built + bundled on macOS/Linux with stable (the webview deps need a newer edition
  # than the workspace MSRV); the Windows app crate is compiled to verify it builds.
  desktop:
    name: desktop app (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux WebKitGTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Front-end deps
        working-directory: gui
        run: npm ci || npm install

      # unix: build the bundled meshd, stage it, and bundle the full desktop app.
      - name: Build + stage meshd (unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release -p lattice-meshd
          cp target/release/meshd gui/src-tauri/resources/meshd
      - name: Bundle desktop app (unix)
        if: runner.os != 'Windows'
        working-directory: gui
        run: npm run tauri build
      - name: Upload bundle (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.os }}
          path: |
            gui/src-tauri/target/release/bundle/**/*.dmg
            gui/src-tauri/target/release/bundle/**/*.AppImage
            gui/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore

      # windows: meshd isn't bundled yet, so just verify the GUI crate compiles.
      - name: Build GUI crate (windows)
        if: runner.os == 'Windows'
        run: cargo build -p lattice-gui --release

  deny:
    name: licenses + advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
