name: Release

# Tag-driven: push a tag like v0.2.0 to cut a desktop release. The Update banner in
# the app reads the latest release's tag_name and compares it to the running version,
# so tags MUST be plain semver (`vMAJOR.MINOR.PATCH`).
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build + bundle the Tauri desktop app (with the meshd sidecar) on each platform,
  # exactly like the CI `desktop` job, then attach the installers to the release.
  desktop:
    name: desktop ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux WebKitGTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Front-end deps
        working-directory: gui
        run: npm ci || npm install
      - name: Build + stage meshd sidecar (+ wintun.dll on Windows)
        shell: bash
        run: |
          cargo build --release -p lattice-meshd
          mkdir -p gui/src-tauri/resources
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/meshd.exe gui/src-tauri/resources/meshd.exe
            # meshd's data plane loads wintun.dll at runtime (the Windows TUN driver);
            # bundle it next to meshd.exe or every peer stays "idle".
            curl -L -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
            unzip -o -j wintun.zip 'wintun/bin/amd64/wintun.dll' -d gui/src-tauri/resources/
          else
            cp target/release/meshd gui/src-tauri/resources/meshd
          fi
      - name: Bundle desktop app
        working-directory: gui
        run: npm run tauri build
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p out
          cd gui/src-tauri/target/release/bundle
          find . -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
            -o -name '*.msi' -o -name '*-setup.exe' \) -exec cp {} "$GITHUB_WORKSPACE/out/" \;
      - uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.os }}
          path: out/*
          if-no-files-found: ignore

  publish:
    name: publish release
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
