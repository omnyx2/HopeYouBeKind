# cargo-deny configuration — enforced in CI.
# Catches license incompatibilities, known vulnerabilities, and unwanted deps.

[advisories]
yanked = "deny"

[licenses]
# Allowlist: permissive licenses compatible with shipping a binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
