# Pin the toolchain so every machine and CI runner builds identically.
# Bump deliberately; treat an MSRV change as a minor version bump.
[toolchain]
channel = "1.79.0"
components = ["rustfmt", "clippy"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]
